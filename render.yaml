services:
  - type: web
    name: chronix-os
    env: node
    rootDir: frontend
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm run start
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/frontend/prisma
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: "file:/opt/render/project/src/frontend/prisma/dev.db"
      # IMPORTANT: You must manually add your Firebase Environment Variables in the Render Dashboard!
      # NEXT_PUBLIC_FIREBASE_API_KEY
      # NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
      # NEXT_PUBLIC_FIREBASE_PROJECT_ID
      # NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
      # NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
      # NEXT_PUBLIC_FIREBASE_APP_ID
      # NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
